<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture-Controlled Home Dashboard</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color:#fff;
}

/* LOGIN */
#loginPage, #loginPage2, #ipPage {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

#loginPage2, #dashboard, #ipPage { display:none; }

.login-box {
  background: rgba(0,255,255,0.08);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 30px cyan;
  text-align:center;
}

.login-box input {
  padding:10px;
  margin:10px;
  width:220px;
  border:none;
  border-radius:10px;
}

.login-box button {
  padding:10px 20px;
  margin:5px;
  background:cyan;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* 🔥 BACK BUTTON */
.back-btn {
  position:absolute;
  bottom:20px;
  right:20px;
  padding:12px 18px;
  border:none;
  border-radius:50px;
  background: linear-gradient(45deg, #ff6a00, #ee0979);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* DASHBOARD */
.container {
  padding:20px;
}

h1 {
  margin-bottom:20px;
  text-align:center;
}

.top-bar {
  display:flex;
  justify-content:flex-end;
  align-items:center;
  margin-bottom:20px;
  gap:10px;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:250px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background: linear-gradient(45deg, #4facfe, #00f2fe);
  color:white;
  cursor:pointer;
  margin:5px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  margin:10px;
  flex:1;
}

.row {
  display:flex;
  flex-wrap:wrap;
}

.status {
  color:red;
}

</style>
</head>

<body>

<!-- LOGIN PAGE 1 -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="loginUser1()">Enter</button><br>
    <button onclick="openNewLogin()">New Login</button>
  </div>
</div>

<!-- LOGIN PAGE 2 -->
<div id="loginPage2">
  <div class="login-box">
    <h2>New Login</h2>
    <input type="text" placeholder="New Username"><br>
    <input type="password" placeholder="New Password"><br>
    <button onclick="loginUser2()">Enter</button>
  </div>

  <button class="back-btn" onclick="goBackToLogin()">⬅ Back</button>
</div>

<!-- 🔥 NEW PAGE AFTER NEW LOGIN -->
<div id="ipPage">
  <div class="login-box">
    <h2>Enter ESP32 IP</h2>
    <input type="text" id="ipInput" placeholder="192.168.1.10"><br>
    <button onclick="goToDashboard()">Continue</button>
  </div>

  <button class="back-btn" onclick="goBackToLogin()">⬅ Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="container">

<h1>Gesture-Controlled Home Dashboard</h1>

<div class="top-bar">
    <input type="text" id="ip" placeholder="ESP32 IP (ex: 192.168.1.10)">
    <button onclick="saveIP()">Save IP</button>
    <button onclick="logout()">Logout</button>
</div>

<div class="row">
  <div class="card">
    <h3>System Status</h3>
    <p id="connection">ESP32 Connection: Disconnected</p>
    <p id="lastUpdate">Last Updated: --</p>
  </div>

  <div class="card">
    <h3>Gesture Status</h3>
    <p id="gesture">Swipe Right → Light ON</p>
    <button onclick="getGesture()">Refresh Gesture</button>
  </div>

  <div class="card">
    <h3>Refresh</h3>
    <button onclick="refreshStatus()">Refresh Status</button>
  </div>
</div>

<div class="row">

  <div class="card">
    <h3>Light 💡</h3>
    <button onclick="control('light','on')">ON</button>
    <button onclick="control('light','off')">OFF</button>
    <p>Status: <span id="lightStatus" class="status">OFF</span></p>
  </div>

  <div class="card">
    <h3>Fan 🌀</h3>
    <button onclick="control('fan','on')">ON</button>
    <button onclick="control('fan','off')">OFF</button>
    <p>Status: <span id="fanStatus" class="status">OFF</span></p>
  </div>

  <div class="card">
    <h3>TV 📺</h3>
    <button onclick="control('tv','on')">ON</button>
    <button onclick="control('tv','off')">OFF</button>
    <p>Status: <span id="tvStatus" class="status">OFF</span></p>
  </div>

  <div class="card">
    <h3>Socket 🔌</h3>
    <button onclick="control('socket','on')">ON</button>
    <button onclick="control('socket','off')">OFF</button>
    <p>Status: <span id="socketStatus" class="status">OFF</span></p>
  </div>

</div>

</div>

<!-- 🔥 BACK BUTTON ON DASHBOARD -->
<button class="back-btn" onclick="logout()">⬅ Back</button>

</div>

<script>
let espIP = "";

function openNewLogin(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('loginPage2').style.display='flex';
}

function loginUser1(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

function loginUser2(){
  document.getElementById('loginPage2').style.display='none';
  document.getElementById('ipPage').style.display='flex';
}

function goToDashboard(){
  espIP = document.getElementById("ipInput").value;
  document.getElementById("ip").value = espIP;
  document.getElementById('ipPage').style.display='none';
  document.getElementById('dashboard').style.display='block';
}

function goBackToLogin(){
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPage2').style.display='none';
  document.getElementById('ipPage').style.display='none';
  document.getElementById('dashboard').style.display='none';
}

function saveIP() {
  espIP = document.getElementById("ip").value;
  alert("IP Saved: " + espIP);
}

function control(device, state) {
  if (!espIP) {
    alert("Enter IP first");
    return;
  }

  fetch(`http://${espIP}/${device}/${state}`)
  .then(res => res.text())
  .then(data => {
    document.getElementById(device + "Status").innerText = state.toUpperCase();
    document.getElementById(device + "Status").style.color = state === "on" ? "lightgreen" : "red";
  })
  .catch(() => alert("ESP32 not reachable"));
}

function refreshStatus() {
  document.getElementById("lastUpdate").innerText = "Last Updated: " + new Date().toLocaleTimeString();
}

function getGesture() {
  document.getElementById("gesture").innerText = "Gesture Updated";
}

function logout() {
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginPage').style.display='flex';
}
</script>

</body>
</html>
